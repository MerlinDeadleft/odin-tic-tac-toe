<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Tic Tac Toe</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Tic-Tac-Toe</h1>
        <a href="https://github.com/MerlinDeadleft/odin-tic-tac-toe" target="_blank" >Github</a>
    </header>
    <div class="centered">
        <div class="player-name-container">
            <svg id="change-player-one-name-button" class="edit icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" height="1rem"><title>edit name</title><path d="M5,3C3.89,3 3,3.89 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V12H19V19H5V5H12V3H5M17.78,4C17.61,4 17.43,4.07 17.3,4.2L16.08,5.41L18.58,7.91L19.8,6.7C20.06,6.44 20.06,6 19.8,5.75L18.25,4.2C18.12,4.07 17.95,4 17.78,4M15.37,6.12L8,13.5V16H10.5L17.87,8.62L15.37,6.12Z" /></svg>
            <svg id="confirm-player-one" class="check icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" disabled><title>confirm change</title><path d="M9,20.42L2.79,14.21L5.62,11.38L9,14.77L18.88,4.88L21.71,7.71L9,20.42Z" /></svg>
            <input type="text" id="player-one-name" value="PlayerOneName" disabled></input>
        </div>
        <div class="player-name-container">
            <input type="text" id="player-two-name" class="right-align" value="PlayerTwoName" disabled></input>
            <svg id="change-player-two-name-button" class="edit icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" height="1rem"><title>edit name</title><path d="M5,3C3.89,3 3,3.89 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V12H19V19H5V5H12V3H5M17.78,4C17.61,4 17.43,4.07 17.3,4.2L16.08,5.41L18.58,7.91L19.8,6.7C20.06,6.44 20.06,6 19.8,5.75L18.25,4.2C18.12,4.07 17.95,4 17.78,4M15.37,6.12L8,13.5V16H10.5L17.87,8.62L15.37,6.12Z" /></svg>
            <svg id="confirm-player-two" class="check icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" disabled><title>confirm change</title><path d="M9,20.42L2.79,14.21L5.62,11.38L9,14.77L18.88,4.88L21.71,7.71L9,20.42Z" /></svg>
        </div>
    </div>
    <div id="turn-indicator" class="centered">Player XX's turn...</div>
    <div id="game-board" class="centered"></div>
    <div id="restart-button-container" class="centered">
        <button id="restart-button">Play Again</button>
    </div>
    <script src="scripts/main.js"></script>
</body>
</html>
